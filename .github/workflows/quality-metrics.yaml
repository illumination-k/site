name: Quality Metrics

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "packages/**"
      - "cli/src/**"
      - "web/src/**"
      - "scripts/collect-metrics.ts"
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "cli/src/**"
      - "web/src/**"
      - "scripts/collect-metrics.ts"

permissions:
  contents: write
  pull-requests: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: install mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3

      - run: pnpm i

      - name: Run coverage
        run: pnpm test:coverage

      - name: Run mutation testing
        run: pnpm test:mutation

      - name: Collect metrics
        run: npx tsx scripts/collect-metrics.ts > /tmp/metrics.json

      - name: Format and post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const metrics = JSON.parse(fs.readFileSync('/tmp/metrics.json', 'utf-8'));
            const cov = metrics.coverage;
            const mut = metrics.mutation;

            const bar = (pct) => {
              const filled = Math.round(pct / 5);
              return '█'.repeat(filled) + '░'.repeat(20 - filled);
            };

            const body = `## 📊 Quality Metrics

            ### Coverage
            | Metric | Coverage | |
            |--------|----------|---|
            | Lines | **${cov.lines}%** | \`${bar(cov.lines)}\` |
            | Statements | **${cov.statements}%** | \`${bar(cov.statements)}\` |
            | Functions | **${cov.functions}%** | \`${bar(cov.functions)}\` |
            | Branches | **${cov.branches}%** | \`${bar(cov.branches)}\` |

            ### Mutation Testing
            | Metric | Value |
            |--------|-------|
            | Mutation Score | **${mut.score}%** |
            | Killed | ${mut.killed} |
            | Survived | ${mut.survived} |
            | Timeout | ${mut.timeout} |
            | No Coverage | ${mut.noCoverage} |
            | Total Mutants | ${mut.total} |

            <sub>${metrics.sha} / ${metrics.date}</sub>`.replace(/^            /gm, '');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('📊 Quality Metrics')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Update metrics history
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx tsx scripts/collect-metrics.ts --update-history

      - name: Commit metrics history
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const path = 'web/src/data/metrics-history.ndjson';
            const content = fs.readFileSync(path, 'utf-8');
            const encoded = Buffer.from(content).toString('base64');

            let sha;
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: 'main',
              });
              sha = data.sha;
            } catch (e) {
              // File doesn't exist yet
            }

            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: 'chore: update quality metrics history',
              content: encoded,
              branch: 'main',
              ...(sha ? { sha } : {}),
            };

            await github.rest.repos.createOrUpdateFileContents(params);
            console.log('Metrics history updated via API');
