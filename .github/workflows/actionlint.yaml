name: Actionlint

on:
  pull_request:
    paths:
      - ".github/workflows/*"
      - ".github/actions/*"

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: install mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
      - name: Run actionlint
        run: actionlint --color
