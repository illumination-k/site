name: web build

on:
  pull_request:
    paths:
      - "web/**"
      - posts/**
      - ".github/workflows/web-build.yaml"
  push:
    branches:
      - main
    paths:
      - "web/**"
      - posts/**
      - ".github/workflows/web-build.yaml"

jobs:
  web-build:
    runs-on: "ubuntu-latest"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: install mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3

      - name: trust
        run: mise trust -P .mise.toml

      - name: cache pnpm store
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.local/share/pnpm/store/v10
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: install deps
        run: pnpm i

      - name: cache turbo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: cache next.js
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('web/**', 'posts/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: build cli
        run: pnpm cli:build

      - name: build web
        run: pnpm web-build

      - name: cache playwright browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml', 'web/package.json') }}

      - name: install playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd web && npx playwright install --with-deps chromium

      - name: install playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd web && npx playwright install-deps chromium

      - name: run e2e tests
        run: cd web && pnpm test:e2e

      # mise trustが必要というエラーが出るが、なんで出るのかわからない
      # 削除するとmise trustはいらないので、一旦削除
      - name: hack
        run: rm -rf .mise.toml

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy web/out --project-name=site --branch=${{ github.head_ref || github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          packageManager: npx
