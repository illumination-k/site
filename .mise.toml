[tools]
dprint = "0.50"
actionlint = "1.7.10"
"aqua:suzuki-shunsuke/ghalint" = "1.5.5"
"pipx:zizmor" = "1.23.1"
prek = "latest"

node = "22"
pnpm = "10"

"npm:@playwright/cli" = "latest"

[hooks]
postinstall = ["prek install -f"]

[tasks.fmt]
description = "Format code"
run = ["dprint fmt", "mise fmt", "pnpm run format"]

[tasks.lint]
description = "Lint code"
run = [
  "dprint check",
  "actionlint",
  "ghalint run",
  "zizmor --no-online-audits --min-severity=low .",
  "pnpm run lint",
]
