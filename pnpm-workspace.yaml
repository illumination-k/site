packages:
  # packagesディレクトリ配下はすべてを登録
  - "packages/**"
  - web
  - cli
auditConfig:
  ignoreCves:
    - CVE-2026-4800
    - CVE-2024-21538
    - CVE-2026-26996
    - CVE-2026-27903
    - CVE-2026-27904
    - CVE-2026-33671
    - CVE-2026-4926

# transitive dependencyがgitやtarball URLから解決されることを防止
blockExoticSubdeps: true

# Supply chain security settings
# 公開から24時間未満のバージョンを除外
minimumReleaseAge: 1440

# ビルドスクリプトの実行を許可するパッケージ
onlyBuiltDependencies:
  - "@biomejs/biome"
  - "@swc/core"
  - esbuild
  - sharp
  - unrs-resolver
  - workerd

# provenanceの信頼レベルが低下したパッケージのインストールを拒否
trustPolicy: no-downgrade
